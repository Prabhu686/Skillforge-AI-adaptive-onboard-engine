spring.application.name=skillforge-server
server.port=5000

# PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/skillforge}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA — auto-creates/updates tables on startup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# File upload
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

# OpenAI (optional — falls back to taxonomy if blank)
openai.api.key=${OPENAI_API_KEY:}
openai.model=gpt-4o-mini

# CORS
client.url=${CLIENT_URL:http://localhost:5173}
